services:
  db:
    image: postgres:15-alpine
    container_name: medislot_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medislot
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.0
    container_name: medislot_migrate
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command: >
      -path /migrations
      -database "postgres://postgres:postgres@db:5432/medislot?sslmode=disable"
      up
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medislot_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      GIN_MODE: release
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: medislot
      DB_SSLMODE: disable
      JWT_SECRET: "ruslan-arman-zhangir-akmaral"
      JWT_EXPIRY_HOURS: "24"
      WORKER_INTERVAL_SECONDS: "60"
      APPOINTMENT_EXPIRY_MINUTES: "30"

volumes:
  pg_data:
